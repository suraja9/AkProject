<body class="bg-light text-dark">

    <div class="py-3 text-center">
        <h1 class="fw-bold">Founder Decision Debt Assessment</h1>
        <p class="text-muted fs-4 mb-0">Diagnose the exact decision pattern draining profit and what to fix first.</p>
    </div>

    <div class="container content-mcq-main mb-5" id="assessment-container"></div>

    <!-- Email Modal (styled) -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        /*
          Full Decision Debt system using the 10 diagnostic questions and pattern mapping from the uploaded PDF.
          This file includes fixes:
            - Correct primary/secondary selection with tie-break hierarchy
            - Severity classification per pattern
            - Type mapping (Reactive Operator, Fragmented Founder, etc.)
            - Correct PDF export using finalResult object
          Source guidance: provided Decision Debt PDF. fileciteturn0file0
        */

        const container = document.getElementById('assessment-container');

        const questions = [
            { id: 1, category: "Reactive Decision-Making", question: "How often do you make decisions without clear criteria, just to keep things moving?", options: ["1 – Never", "2 – Rarely", "3 – Sometimes", "4 – Often", "5 – Almost daily"], type: "scale" },
            { id: 2, category: "Fragmentation", question: "How often do minor decisions interrupt major ones and break your focus?", options: ["1 – Never", "2 – Rarely", "3 – Sometimes", "4 – Often", "5 – Almost daily"], type: "scale" },
            { id: 3, category: "Reversal / Inconsistency", question: "How often do you change your mind after giving your team direction?", options: ["1 – Never", "2 – Rarely", "3 – Sometimes", "4 – Often", "5 – Almost daily"], type: "scale" },
            { id: 4, category: "Overcommitment", question: "How often do you say yes to things you don't have the bandwidth to manage?", options: ["1 – Never", "2 – Rarely", "3 – Sometimes", "4 – Often", "5 – Almost daily"], type: "scale" },
            { id: 5, category: "Speed Mismatch", question: "How often do decisions sit in your head for days before you make them?", options: ["1 – Never", "2 – Rarely", "3 – Sometimes", "4 – Often", "5 – Almost daily"], type: "scale" },
            { id: 6, category: "Reactive Decision-Making", question: "How often do you make important decisions when you're mentally tired?", options: ["1 – Never", "2 – Rarely", "3 – Sometimes", "4 – Often", "5 – Almost daily"], type: "scale" },
            { id: 7, category: "Overcommitment / Dependency", question: "How often does your team wait for you because they aren't confident deciding without you?", options: ["1 – Never", "2 – Rarely", "3 – Sometimes", "4 – Often", "5 – Almost daily"], type: "scale" },
            { id: 8, category: "Reversal / Inconsistency", question: "How often do you skip reviewing the downstream impact of your decisions?", options: ["1 – Never", "2 – Rarely", "3 – Sometimes", "4 – Often", "5 – Almost daily"], type: "scale" },
            { id: 9, category: "Fragmentation", question: "How often do you switch priorities because something feels urgent, even when the plan was clear?", options: ["1 – Never", "2 – Rarely", "3 – Sometimes", "4 – Often", "5 – Almost daily"], type: "scale" },
            { id: 10, category: "Speed Mismatch", question: "How often do you make decisions faster than your team can implement them?", options: ["1 – Never", "2 – Rarely", "3 – Sometimes", "4 – Often", "5 – Almost daily"], type: "scale" },
            { id: 11, category: "Profile", question: "Which best describes your current situation?", options: ["Founder", "Co-founder", "CEO"], type: "choice" },
            { id: 12, category: "Profile", question: "What is your current revenue?", options: ["<$1M", "$1M - $5M", "$6M- $10M", "$11M - $15M", ">$15M"], type: "choice" },
            { id: 13, category: "Goals", question: "What is the most important desired outcome for you to achieve in the next 90 days?", options: [], type: "text" },
            { id: 14, category: "Challenges", question: "What is the obstacle that you think is stopping you or what have you tried that hasn't worked in the past?", options: [], type: "text" },
            { id: 15, category: "Additional Info", question: "Is there anything else that you think we need to know about?", options: [], type: "text" }
        ];

        let currentQuestion = 0;
        let answers = {}; // questionId => value (1..5)
        let userInfo = { name: '', email: '' }; // Store user name and email

        /* ----- Scoring helpers & mappings ----- */

        const patternHierarchy = [
            "Reactive Decision-Making",
            "Fragmentation",
            "Overcommitment / Dependency",
            "Reversal / Inconsistency",
            "Speed Mismatch"
        ];

        const patternToType = {
            "Reactive Decision-Making": "Reactive Operator",
            "Fragmentation": "Fragmented Founder",
            "Reversal / Inconsistency": "Inconsistent Decider",
            "Overcommitment / Dependency": "Overcommitted Bottleneck",
            "Speed Mismatch": "Speed Mismatch Founder"
        };

        function computePatternScores() {
            const mapping = {
                "Reactive Decision-Making": [1, 6],
                "Fragmentation": [2, 9],
                "Reversal / Inconsistency": [3, 8],
                "Overcommitment / Dependency": [4, 7],
                "Speed Mismatch": [5, 10]
            };
            const patternScores = {};
            for (const [pattern, qids] of Object.entries(mapping)) {
                let total = 0;
                qids.forEach(qid => { total += (answers[qid] || 0); });
                patternScores[pattern] = total; // range 0-10 (0 if skipped)
            }
            return patternScores;
        }

            // Only count scale questions (1-10) for overall score
            const scaleQuestions = questions.filter(q => q.type === 'scale');
            let sum = 0;
            scaleQuestions.forEach(q => {
                const val = answers[q.id];
                if (typeof val === 'number') {
                    sum += val || 0;
                }
            });
            const max = scaleQuestions.length * 5;
            const percent = Math.round((sum / max) * 100);
            return { sum, percent, max };
        }

        function determinePrimaryPattern(patternScores) {
            const minScore = Math.min(...Object.values(patternScores));
            const tied = Object.entries(patternScores)
                .filter(([p, s]) => s === minScore)
                .map(([p]) => p);
            if (tied.length === 1) return tied[0];
            for (let h of patternHierarchy) {
                if (tied.includes(h)) return h;
            }
            return tied[0];
        }

            const entries = Object.entries(patternScores)
                .filter(([p]) => p !== primary)
                .sort((a, b) => b[1] - a[1]); // Sort descending to get second highest
            return entries.length > 0 ? entries[0][0] : primary;

          <p style="color: rgba(255,255,255,0.95); font-size: 1.1rem; margin-bottom: 16px; position: relative; z-index: 1;">Get clarity on what matters now and what can wait.</p>
          <div style="display: flex; flex-direction: column; gap: 16px; align-items: center; margin-bottom: 16px; position: relative; z-index: 1;">
            <a class="cta-button" href="/" style="display: inline-block; text-decoration: none; background: #2c3e50; color: white;">Calculate the hidden cost of your bottleneck decisions</a>
          </div>
          <a href="#" onclick="downloadPDFAndSendEmail(event); return false;" style="color: white; text-decoration: underline; font-size: 1.1rem; font-weight: 600; position: relative; z-index: 1; cursor: pointer;">Download Report</a>
        </div>
      </div>
    </div>
  `;

            window.finalResult = {
                patternScores,
                overall,
                primary: { name: primaryType, rawPattern: primaryPattern, score: patternScores[primaryPattern], content: primaryContent },
                secondary: { name: secondaryType, rawPattern: secondaryPattern, score: patternScores[secondaryPattern], content: secondaryContent }
            };

            // 🔥 SAVE TO WORDPRESS (FIX)
            saveSubmissionToWordPress();

            // Send one email to admin with PDF attached (after a short delay so the results DOM is ready for PDF generation)
            setTimeout(function () {
                generateAndDownloadPDF(userInfo.email || '', true);
            }, 1200);
        }

        /* ----- Recommendations & PDF generation ----- */
        function getRecommendations(percent) {
            if (percent >= 85) return ["Document winning decision routines", "Mentor leaders to scale your frameworks", "Build accountability to lock gains"];
            if (percent >= 70) return ["Strengthen weaker pattern blocks", "Introduce routine decision reviews", "Train team to own execution"];
            if (percent >= 55) return ["Start daily clarity rituals", "Create simple decision templates", "Audit priority leaks"];
            return ["Start with core reset rituals", "Seek focused coaching", "Create a triage decision system today"];
        }

        function showEmailModal() {
            // Pre-fill email if we have it
            const emailInput = document.getElementById('userEmail');
            if (emailInput && userInfo.email) {
                emailInput.value = userInfo.email;
            }
            document.getElementById('styledWrapper').style.display = 'flex';
        }

        function downloadPDFDirectly() {
            generateAndDownloadPDF(null);
        }

        async function downloadPDFAndSendEmail(event) {
            event.preventDefault();
            // Use stored email or prompt for email
            const email = userInfo.email || prompt('Please enter your email address to receive the report:');
            if (!email || !email.includes('@')) {
                alert('Please enter a valid email address.');
                return;
            }
            await generateAndDownloadPDF(email);
        }

        function getScoreBandForPDF(patternScores) {
            if (!patternScores) return null;
            const values = Object.values(patternScores).filter(v => typeof v === 'number');
            if (values.length === 0) return null;
            const maxScore = Math.max(...values);
            if (maxScore >= 8 && maxScore <= 10) return { minScoreToInclude: 8, label: 'HIGH (8–10)' };
            if (maxScore >= 5 && maxScore <= 7) return { minScoreToInclude: 5, label: 'MODERATE (5–7)' };
            return null; // caution/perfect: no extra pattern cards needed
        }

        function upsertPdfExtraPatterns(containerEl, frag) {
            if (!containerEl || !frag || !frag.patternScores) return null;

            const band = getScoreBandForPDF(frag.patternScores);
            if (!band) return null;

            const primary = frag.primary && frag.primary.rawPattern;
            const secondary = frag.secondary && frag.secondary.rawPattern;

            const inBand = Object.entries(frag.patternScores)
                .filter(([, s]) => typeof s === 'number' && s >= band.minScoreToInclude)
                .sort((a, b) => b[1] - a[1]);

            const extras = inBand.filter(([p]) => p !== primary && p !== secondary);
            if (extras.length === 0) return null; // nothing beyond the dashboard cap

            // Create or update the PDF-only wrapper
            let wrapper = document.getElementById('pdf-extra-patterns');
            if (!wrapper) {
                wrapper = document.createElement('div');
                wrapper.id = 'pdf-extra-patterns';
                wrapper.className = 'row mb-4 pdf-only';

                // Insert near the bottom of the PDF (right before the CTA row, which is hidden during export)
                const ctaSection = containerEl.querySelector('.cta-section');
                const ctaRow = ctaSection ? ctaSection.closest('.row') : null;
                if (ctaRow && ctaRow.parentNode) {
                    ctaRow.parentNode.insertBefore(wrapper, ctaRow);
                } else {
                    containerEl.appendChild(wrapper);
                }
            }

            // Ensure the section starts on a NEW PDF page (screenshot is sliced into pages)
            // We do this by inserting a spacer before the section to align it to the next page boundary.
            let breakEl = document.getElementById('pdf-extra-patterns-break');
            if (!breakEl) {
                breakEl = document.createElement('div');
                breakEl.id = 'pdf-extra-patterns-break';
                breakEl.className = 'pdf-only';
                breakEl.style.width = '100%';
                breakEl.style.height = '0px';
                if (wrapper.parentNode) {
                    wrapper.parentNode.insertBefore(breakEl, wrapper);
                }
            } else {
                breakEl.style.height = '0px';
            }

            const typeContent = getTypeContent();

            wrapper.innerHTML = `
              <div class="col-12">
                <div class="pattern-breakdown-card" style="margin-top: 8px;">
                  <h5 style="margin-bottom: 8px;">Additional patterns in the top score band</h5>
                  <p style="color: var(--text-secondary); margin-bottom: 18px;">
                    Dashboard shows a maximum of 2. This PDF includes the additional patterns that also land in <strong>${band.label}</strong>.
                  </p>
                  <div class="row g-4">
                    ${extras.map(([p, s]) => {
                const c = typeContent[p];
                const sev = classifySeverity(s);
                const accent = sev === 'HIGH' ? '#F70000' : '#f39c12';
                const badgeGrad = sev === 'HIGH'
                    ? 'linear-gradient(135deg, #F70000 0%, #c82333 100%)'
                    : 'linear-gradient(135deg, #f39c12 0%, #e67e22 100%)';

                return `
                        <div class="col-lg-6">
                          <div class="pattern-card">
                            <div class="pattern-header">
                              <div class="pattern-icon" style="background: ${badgeGrad};">📌</div>
                              <div>
                                <h4 class="mb-0" style="font-weight: 800; color: var(--text-primary); font-size: 1.5rem;">${c?.title || p}</h4>
                                <p class="mb-0 mt-2" style="color: var(--text-secondary); font-size: 0.95rem;">Score: ${s} / 10</p>
                              </div>
                            </div>
                            <div class="mt-3 mb-3">
                              <span class="severity-badge severity-${sev.toLowerCase()}" style="font-size: 0.9rem; padding: 8px 16px; background: ${badgeGrad};">Severity: ${sev}</span>
                            </div>

                            <div class="info-box" style="border-left-color: ${accent};">
                              <h6 style="color: ${accent};">What this means</h6>
                              <p>${c?.meaning || ''}</p>
                            </div>

                            <div class="info-box" style="border-left-color: ${accent};">
                              <h6 style="color: ${accent};">What's happening</h6>
                              <ul>${(c?.happening || []).map(i => `<li>${i}</li>`).join('')}</ul>
                            </div>

                            <div class="info-box" style="border-left-color: ${accent};">
                              <h6 style="color: ${accent};">Why it's happening</h6>
                              <p>${c?.why || ''}</p>
                            </div>

                            <div class="info-box" style="border-left-color: ${accent};">
                              <h6 style="color: ${accent};">How this hits profit</h6>
                              <ul>${(c?.profit || []).map(i => `<li>${i}</li>`).join('')}</ul>
                            </div>

                            <div class="action-box" style="border-color: ${accent};">
                              <h6 style="color: ${accent};">What to fix first</h6>
                              <p>${c?.fixFirst || ''}</p>
                            </div>

                            <div class="action-box" style="border-color: ${accent}; margin-top: 16px;">
                              <h6 style="color: ${accent};">Next step</h6>
                              <p>${c?.nextStep || ''}</p>
                            </div>
                          </div>
                        </div>
                      `;
            }).join('')}
                  </div>
                </div>
              </div>
            `;

            try {
                // Match the PDF slicing math:
                // one page slice height in CSS px ≈ containerWidth * (pageHeightMm / pageWidthMm)
                const pdfWidth = 210;
                const pdfHeight = 297;
                const margin = 10;
                const pageWidth = pdfWidth - (margin * 2);   // 190mm
                const pageHeight = pdfHeight - (margin * 2); // 277mm

                // Reset break height first so we measure the real top
                breakEl.style.height = '0px';

                const containerTop = containerEl.getBoundingClientRect().top;
                const wrapperTop = wrapper.getBoundingClientRect().top - containerTop;
                const pageSliceHeightPx = containerEl.scrollWidth * (pageHeight / pageWidth);

                if (pageSliceHeightPx > 0) {
                    const mod = ((wrapperTop % pageSliceHeightPx) + pageSliceHeightPx) % pageSliceHeightPx;
                    const pad = (pageSliceHeightPx - mod) % pageSliceHeightPx;
                    // Pad to the NEXT page boundary (even if we're close to it, that's fine)
                    breakEl.style.height = `${Math.ceil(pad)}px`;
                }
            } catch (e) {
                // ignore alignment errors; PDF export should still work
            }

            return { wrapper, breakEl };
        }

        document.getElementById('cancelEmail').addEventListener('click', () => {
            document.getElementById('styledWrapper').style.display = 'none';
        });

        document.getElementById('submitEmail').addEventListener('click', async () => {
            const email = document.getElementById('userEmail').value.trim();
            const err = document.getElementById('emailError');
            if (!email || !email.includes('@')) { err.style.display = 'block'; return; }
            err.style.display = 'none';
            // Update stored email if changed
            userInfo.email = email;
            await generateAndDownloadPDF(email);
            document.getElementById('styledWrapper').style.display = 'none';
        });

        function upsertPdfCta(containerEl) {
            let ctaWrapper = document.getElementById('pdf-cta-wrapper');
            if (!ctaWrapper) {
                ctaWrapper = document.createElement('div');
                ctaWrapper.id = 'pdf-cta-wrapper';
                ctaWrapper.className = 'row pdf-only';
                ctaWrapper.innerHTML = `
                  <div class="col-12">
                    <div class="cta-section" style="margin-top: 32px; margin-bottom: 0;">
                      <a class="cta-button" href="https://calendly.com/bhaconsultingsolutions/personal-coaching/?month=2026-02" target="_blank" rel="noopener noreferrer" style="display: inline-block; text-decoration: none; margin-bottom: 16px;">Discuss My Results</a>
                      <p style="color: rgba(255,255,255,0.95); font-size: 1.1rem; margin-bottom: 16px; position: relative; z-index: 1;">Get clarity on what matters now and what can wait.</p>
                      <a id="pdf-website-link" class="cta-button" href="https://anilkarakkattuu.com/" target="_blank" rel="noopener noreferrer" style="display: inline-block; text-decoration: none; position: relative; z-index: 1;">Visit anilkarakkattuu.com</a>
                    </div>
                  </div>
                `;
                containerEl.appendChild(ctaWrapper);
            }
            return ctaWrapper;
        }

        async function generateAndDownloadPDF(email, sendEmailToAdminOnly) {
            const FRAG = window.finalResult;
            if (!FRAG) {
                if (!sendEmailToAdminOnly) alert('No result to export.');
                return;
            }

            // Hide the web CTA section and add PDF CTA section
            const ctaSection = container.querySelector('.cta-section');
            const ctaRow = ctaSection ? ctaSection.closest('.row') : null;
            const originalCTADisplay = ctaRow ? ctaRow.style.display : '';
            if (ctaRow) {
                ctaRow.style.display = 'none';
            }

            // PDF-only additions: temporarily inject extra pattern cards (if needed) AND new CTA
            let pdfExtra = null;
            let pdfCta = null;
            document.body.classList.add('pdf-mode');

            // Link coordinates (relative to container)
            let btnLinkCoords = null;
            let websiteLinkCoords = null;

            try {
                pdfExtra = upsertPdfExtraPatterns(container, FRAG);
                pdfCta = upsertPdfCta(container);

                // Capture button coordinates for PDF link BEFORE html2canvas
                const pdfBtn = document.querySelector('#pdf-cta-wrapper .cta-button');
                if (pdfBtn) {
                    const btnRect = pdfBtn.getBoundingClientRect();
                    const containerRect = container.getBoundingClientRect();
                    btnLinkCoords = {
                        x: btnRect.left - containerRect.left,
                        y: btnRect.top - containerRect.top,
                        w: btnRect.width,
                        h: btnRect.height
                    };
                }
                const pdfWebsiteLink = document.getElementById('pdf-website-link');
                if (pdfWebsiteLink) {
                    const linkRect = pdfWebsiteLink.getBoundingClientRect();
                    const containerRect = container.getBoundingClientRect();
                    websiteLinkCoords = {
                        x: linkRect.left - containerRect.left,
                        y: linkRect.top - containerRect.top,
                        w: linkRect.width,
                        h: linkRect.height
                    };
                }

            } catch (e) {
                console.error(e);
                pdfExtra = null;
                pdfCta = null;
            }

            try {
                // Scroll to top
                window.scrollTo(0, 0);
                await new Promise(resolve => setTimeout(resolve, 300));

                // Capture the container with html2canvas
                // NOTE: scale heavily affects speed + memory. 2.0 is a good balance for quality vs performance.
                const canvas = await html2canvas(container, {
                    scale: 2.0,
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#f5f7fa',
                    width: container.scrollWidth,
                    height: container.scrollHeight,
                    windowWidth: container.scrollWidth,
                    windowHeight: container.scrollHeight,
                    scrollX: 0,
                    scrollY: 0,
                    allowTaint: false,
                    letterRendering: false,
                    onclone: function (clonedDoc) {
                        // Ensure styles are preserved
                        const clonedContainer = clonedDoc.querySelector('#assessment-container');
                        if (clonedContainer) {
                            clonedContainer.style.transform = 'none';
                        }
                    }
                });

                const imgWidth = canvas.width;
                const imgHeight = canvas.height;

                // A4 page dimensions in mm
                const pdfWidth = 210;
                const pdfHeight = 297;
                const margin = 10;
                const pageWidth = pdfWidth - (margin * 2);
                const pageHeight = pdfHeight - (margin * 2);

                // Calculate image dimensions to fit page width
                const imgAspectRatio = imgWidth / imgHeight;
                const finalWidth = pageWidth;
                const finalHeight = pageWidth / imgAspectRatio;

                // Create PDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4',
                    compress: true
                });

                // Split across pages
                let yPosition = 0;
                let pageNum = 0;

                while (yPosition < finalHeight) {
                    if (pageNum > 0) {
                        pdf.addPage();
                    }

                    const remainingHeight = finalHeight - yPosition;
                    const pageImgHeight = Math.min(pageHeight, remainingHeight);

                    // Calculate source position
                    const sourceY = (yPosition / finalHeight) * imgHeight;
                    const sourceHeight = (pageImgHeight / finalHeight) * imgHeight;

                    // Extract page slice from canvas
                    const pageCanvas = document.createElement('canvas');
                    pageCanvas.width = imgWidth;
                    pageCanvas.height = sourceHeight;
                    const ctx = pageCanvas.getContext('2d');
                    ctx.drawImage(canvas, 0, sourceY, imgWidth, sourceHeight, 0, 0, imgWidth, sourceHeight);

                    // JPEG is much faster/smaller than PNG for screenshot-style pages
                    const pageImgData = pageCanvas.toDataURL('image/jpeg', 0.85);
                    pdf.addImage(pageImgData, 'JPEG', margin, margin, finalWidth, pageImgHeight);

                    yPosition += pageHeight;
                    pageNum++;
                }

                // Add clickable links in PDF
                const k = pageWidth / container.scrollWidth; // mm per px
                function addPdfLink(coords, url) {
                    if (!coords) return;
                    const x_mm = margin + (coords.x * k);
                    const y_mm_total = coords.y * k;
                    const pIndex = Math.floor(y_mm_total / pageHeight);
                    const y_on_page = margin + (y_mm_total % pageHeight);
                    const w_mm = coords.w * k;
                    const h_mm = coords.h * k;
                    if (pIndex >= 0 && pIndex < pdf.getNumberOfPages()) {
                        pdf.setPage(pIndex + 1);
                        pdf.link(x_mm, y_on_page, w_mm, h_mm, { url: url });
                    }
                }
                addPdfLink(btnLinkCoords, 'https://calendly.com/bhaconsultingsolutions/personal-coaching/?month=2026-02');
                addPdfLink(websiteLinkCoords, 'https://anilkarakkattuu.com/');

                const pdfBlob = pdf.output('blob');

                // Remove PDF-only additions
                document.body.classList.remove('pdf-mode');
                if (pdfExtra?.breakEl && pdfExtra.breakEl.parentNode) {
                    pdfExtra.breakEl.parentNode.removeChild(pdfExtra.breakEl);
                }
                if (pdfExtra?.wrapper && pdfExtra.wrapper.parentNode) {
                    pdfExtra.wrapper.parentNode.removeChild(pdfExtra.wrapper);
                }
                if (pdfCta && pdfCta.parentNode) {
                    pdfCta.parentNode.removeChild(pdfCta);
                }

                // Restore web CTA section
                if (ctaRow) {
                    ctaRow.style.display = originalCTADisplay;
                }

                // Only download when user clicked "Download Report" (not when sending the one email on completion)
                if (!sendEmailToAdminOnly) {
                    const url = URL.createObjectURL(pdfBlob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'decision-debt-report.pdf';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }

                // Send email with PDF to admin only when questionnaire was just completed (one-time email with PDF)
                if (sendEmailToAdminOnly && pdfBlob && pdfBlob.size > 0) {
                    const emailToUse = email || userInfo.email;
                    console.log('📧 Sending PDF email to admin (on completion). Email:', emailToUse, 'PDF Blob size:', pdfBlob.size + ' bytes');

                    const reader = new FileReader();
                    reader.onloadend = function () {
                        const base64data = reader.result;

                        const formData = new FormData();
                        formData.append('action', 'send_decision_debt_pdf_email_base64');
                        formData.append('user_email', emailToUse);
                        formData.append('user_name', userInfo.name || 'User');
                        formData.append('answers', JSON.stringify(answers));
                        formData.append('pdf_base64', base64data);

                        fetch('/wp-admin/admin-ajax.php', {
                            method: 'POST',
                            body: formData
                        })
                            .then(response => response.ok ? response.text() : Promise.reject(new Error('HTTP ' + response.status)))
                            .then(text => {
                                try { return JSON.parse(text); } catch (e) { throw new Error('Invalid JSON'); }
                            })
                            .then(data => {
                                if (data.success) {
                                    console.log('✅ Email with PDF sent to admin.');
                                } else {
                                    console.error('❌ Failed to send PDF email:', data.data);
                                }
                            })
                            .catch(error => console.error('❌ Error sending PDF email:', error));
                    };
                    reader.onerror = function (error) {
                        console.error('❌ Failed to read PDF blob:', error);
                    };
                    reader.readAsDataURL(pdfBlob);
                }
            } catch (error) {
                console.error('Error generating PDF:', error);
                alert('Error generating PDF. Please try again.');

                // Remove PDF-only additions on error
                document.body.classList.remove('pdf-mode');
                if (pdfExtra?.breakEl && pdfExtra.breakEl.parentNode) {
                    pdfExtra.breakEl.parentNode.removeChild(pdfExtra.breakEl);
                }
                if (pdfExtra?.wrapper && pdfExtra.wrapper.parentNode) {
                    pdfExtra.wrapper.parentNode.removeChild(pdfExtra.wrapper);
                }
                if (pdfCta && pdfCta.parentNode) {
                    pdfCta.parentNode.removeChild(pdfCta);
                }

                // Restore web CTA section on error
                if (ctaRow) {
                    ctaRow.style.display = originalCTADisplay;
                }
            }
        }

        /* ----- Utility + restart ----- */
        function restart() {
            currentQuestion = 0;
            answers = {};
            userInfo = { name: '', email: '' };
            renderWelcomeScreen();
        }

        // Start with welcome screen
        renderWelcomeScreen();

    </script>
